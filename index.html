<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор стоимости разработки — Фрилансер</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <h1>Калькулятор стоимости разработки — Фрилансер-разработчик</h1>

    <form id="calc-form">
      <div class="field">
        <label for="service">Услуга</label>
        <select id="service" name="service">
          <option value="landing">Лендинг / Квиз-лендинг — 19 000 ₽ (база до 6 экранов)</option>
          <option value="visitor">Сайт-визитка / Портфолио — 14 000 ₽ (база до 5 экранов)</option>
          <option value="calculator">Интерактивный калькулятор — 27 000 ₽ (база до 5 экранов)</option>
          <option value="corporate">Корпоративный сайт — 37 000 ₽ (база до 8 экранов)</option>
          <option value="other">Другое</option>
        </select>
      </div>

      <!-- display: none перенесён в CSS, inline-стиль убран -->
      <div class="field" id="other-price-wrap">
        <label for="other-price">Ваша цена (база), ₽</label>
        <input type="number" id="other-price" name="other-price" min="0" value="0" placeholder="0">
      </div>

      <div class="field">
        <label>Количество экранов/страниц: <strong id="screens-value">1</strong></label>
        <input type="range" id="screens" name="screens" min="1" max="20" value="1">
      </div>

      <div class="field checkboxes">
        <label><input type="checkbox" id="opt-telegram" name="telegram" value="4500"> Telegram + форма обратной связи (+4 500 ₽)</label>
        <label><input type="checkbox" id="opt-seo" name="seo" value="5500"> SEO базовая (+5 500 ₽)</label>
        <label><input type="checkbox" id="opt-design" name="design" value="9000"> Уникальный дизайн (+9 000 ₽)</label>
        <label><input type="checkbox" id="opt-urgency" name="urgency"> Срочность 3–5 дней (+50 % к итогу)</label>
      </div>

      <!-- hr.divider — визуальный разделитель между настройками и итогом -->
      <hr class="divider">

      <div class="total">
        <strong>Итого:</strong> <span id="total-price">0</span> ₽
      </div>

      <div class="buttons">
        <button type="button" id="btn-offer">Получить коммерческое предложение</button>
        <button type="button" id="btn-print">Распечатать расчёт</button>
      </div>

      <!-- Блок результата больше не используется, но можно оставить или удалить. Мы его удалим. -->
    </form>
  </div>

  <!-- Модальное окно -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-window">
      <button id="modal-close" class="modal-close">&times;</button>
      
      <div id="modal-form-content">
        <h2>Оставьте заявку</h2>
        <p>Я свяжусь с вами для обсуждения деталей.</p>
        
        <form id="lead-form">
          <div class="field">
            <label for="lead-name">Имя <span class="req">*</span></label>
            <input type="text" id="lead-name" placeholder="Иван">
            <span class="error-text" id="err-name">Пожалуйста, введите ваше имя</span>
          </div>
          
          <div class="field">
            <label for="lead-phone">Телефон <span class="req">*</span></label>
            <input type="tel" id="lead-phone" placeholder="+7 (999) 000-00-00">
            <span class="error-text" id="err-phone">Пожалуйста, введите ваш телефон</span>
          </div>
          
          <div class="field">
            <label for="lead-tg">Telegram</label>
            <input type="text" id="lead-tg" placeholder="@username">
          </div>
          
          <button type="submit" class="btn-submit">Отправить заявку</button>
        </form>
      </div>

      <div id="modal-success" class="modal-success">
        <div class="success-icon">✓</div>
        <h3>Заявка отправлена!</h3>
        <p>Я свяжусь с вами в ближайшее время.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
